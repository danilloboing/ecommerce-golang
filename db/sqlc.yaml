version: "2"
sql:
  - engine: postgresql
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "queries"
        out: "../internal/platform/postgres/queries"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_exact_table_names: false
        emit_json_tags: false
        emit_pointers_for_null_types: true
        omit_unused_structs: true

version: "2"
sql:
  - engine: postgresql
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "queries"
        out: "../internal/platform/postgres/queries"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_exact_table_names: false
        emit_json_tags: false
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - go_type: "github.com/google/uuid.UUID"
            db_type: "uuid"
          - go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
            db_type: "uuid"
            nullable: true
          - go_type: "time.Time"
            db_type: "timestamptz"
          - go_type:
              import: "time"
              type: "Time"
              pointer: true
            db_type: "timestamptz"
            nullable: true

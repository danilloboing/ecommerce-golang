run:
  timeout: 5m
  go: "1.23"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocyclo
    - gosec
    - goconst
    - gofumpt
    - goimports
    - revive
    - sqlclosecheck
    - nilerr
    - errorlint
    - bodyclose
    - noctx
    - prealloc
linters-settings:
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/danilloboing/marketplace-golang
  revive:
    rules:
      - name: exported
        severity: warning
      - name: package-comments
        severity: warning
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
